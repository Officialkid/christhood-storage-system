# ═══════════════════════════════════════════════════════════════════════════════
# render.yaml — Render Blueprint for Christhood CMMS
#
# Defines all services in one file so a single "New Blueprint Instance"
# click in Render deploys the full stack:
#   1. christhood-web    — Next.js app  (Dockerfile in repo root)
#   2. christhood-worker — cron worker  (workers/Dockerfile)
#   3. christhood-db     — Managed PostgreSQL database
#
# Docs: https://render.com/docs/blueprint-spec
# ═══════════════════════════════════════════════════════════════════════════════

databases:
  - name: christhood-db
    databaseName: christhood
    user: christhood
    plan: free          # upgrade to starter ($7/mo) for production persistence

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Web service — Next.js application
  # ─────────────────────────────────────────────────────────────────────────────
  - type: web
    name: christhood-web
    runtime: docker
    # Render builds from repo root using the root Dockerfile
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free           # upgrade to starter ($7/mo) for always-on
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: PORT
        value: "3000"

      # ── Auth ─────────────────────────────────────────────────────────────────
      - key: NEXTAUTH_SECRET
        sync: false           # set manually in Render dashboard
      - key: NEXTAUTH_URL
        sync: false           # set to your Render URL or custom domain
      - key: NEXTAUTH_URL_INTERNAL
        sync: false

      # ── Database — auto-wired from the database block above ──────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: christhood-db
          property: connectionString

      # ── Google OAuth ─────────────────────────────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

      # ── Cloudflare R2 ─────────────────────────────────────────────────────────
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET_NAME
        sync: false

      # ── Email (Resend) ────────────────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

      # ── Web Push (VAPID) ──────────────────────────────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ── Cron auth ─────────────────────────────────────────────────────────────
      - key: CRON_SECRET
        sync: false

      # ── Storage alert thresholds (optional) ──────────────────────────────────
      - key: STORAGE_THRESHOLD_PERCENT
        value: "80"
      - key: STORAGE_LIMIT_GB
        value: "50"

  # ─────────────────────────────────────────────────────────────────────────────
  # Background worker — node-cron jobs (trash purge + archive automation)
  # ─────────────────────────────────────────────────────────────────────────────
  - type: worker
    name: christhood-worker
    runtime: docker
    dockerfilePath: ./workers/Dockerfile
    dockerContext: .
    plan: free           # upgrade to starter for always-on
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database — same auto-wired connection string ──────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: christhood-db
          property: connectionString

      # ── Cloudflare R2 ─────────────────────────────────────────────────────────
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET_NAME
        sync: false
