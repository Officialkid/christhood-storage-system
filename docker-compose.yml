# ── Christhood CMMS — Full Stack ─────────────────────────────────────────────
#
# Start everything:
#   docker compose up -d
#
# Stop everything:
#   docker compose down
#
# Stop AND delete the database volume (wipes all data):
#   docker compose down -v
#
# View logs from all services:
#   docker compose logs -f
#
# Rebuild a specific service after code changes:
#   docker compose build app   (or worker)
#   docker compose up -d --no-deps app
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. PostgreSQL 15 ────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      # Named volume — database files persist across container restarts and
      # rebuilds. Deleting this volume wipes all data permanently.
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 is intentionally NOT exposed to the host machine.
    # Other containers reach this service via the hostname "db" on the
    # internal "cmms" network defined below.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cmms

  # ── 2. Next.js Application ──────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Maps container port 3000 → host port 3000.
      # Put a reverse proxy (Nginx / Caddy / Traefik) in front of this in
      # production rather than exposing 3000 directly to the internet.
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy   # waits for pg_isready before starting
    networks:
      - cmms

  # ── 3. Background Worker (node-cron) ────────────────────────────────────────
  worker:
    build:
      # Build context must be the repo root so the Dockerfile inside
      # workers/ can COPY prisma/schema.prisma during the build.
      context: .
      dockerfile: workers/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy   # waits for pg_isready before starting
    networks:
      - cmms

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    # Docker manages the physical location of this volume.
    # Inspect it with: docker volume inspect christhood-storage-system_postgres_data

# ── Internal network ───────────────────────────────────────────────────────────
networks:
  cmms:
    # All three containers share this bridge network.
    # They reach each other by service name:
    #   app  → postgresql://…@db:5432/…
    #   worker → same DATABASE_URL
    driver: bridge
