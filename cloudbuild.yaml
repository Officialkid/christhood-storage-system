# ═══════════════════════════════════════════════════════════════════════════════
# cloudbuild.yaml — Google Cloud Build trigger configuration
#
# Alternative to GitHub Actions for CI/CD.
# Connect at: https://console.cloud.google.com/cloud-build/triggers
#
# Substitution variables (set in the Cloud Build trigger UI, or pass via
# `gcloud builds submit --substitutions=...`):
#   _REGION     — GCP region           (default: us-central1)
#   _AR_REPO    — Artifact Registry repo name (default: christhood-repo)
#   _SERVICE    — Cloud Run service name (default: christhood-cmms)
#
# Built-in substitutions used automatically:
#   $PROJECT_ID — your GCP project ID
#   $COMMIT_SHA — the triggering Git commit SHA
# ═══════════════════════════════════════════════════════════════════════════════

substitutions:
  _REGION:  us-central1
  _AR_REPO: christhood-repo
  _SERVICE: christhood-cmms

steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '--tag=$$_IMAGE:$COMMIT_SHA'
      - '--tag=$$_IMAGE:latest'
      - '--build-arg=NEXT_TELEMETRY_DISABLED=1'
      - '.'
    env:
      - '_IMAGE=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app'

  # ── Step 2: Push both tags to Artifact Registry ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    waitFor: ['build']
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app'

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  # Cloud Run reads all secrets from Secret Manager at startup.
  # Non-sensitive config is passed inline below.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: deploy
    waitFor: ['push']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=3000'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--cpu-throttling'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--concurrency=80'
      - '--timeout=300'
      - '--startup-cpu-boost'
      - '--set-env-vars=NODE_ENV=production,NEXT_TELEMETRY_DISABLED=1,FFMPEG_PATH=/usr/bin/ffmpeg'
      - >-
        --update-secrets=DATABASE_URL=DATABASE_URL:latest,
        DIRECT_URL=DIRECT_URL:latest,
        NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,
        NEXTAUTH_URL=NEXTAUTH_URL:latest,
        NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest,
        GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,
        GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,
        CLOUDFLARE_R2_ACCOUNT_ID=CLOUDFLARE_R2_ACCOUNT_ID:latest,
        CLOUDFLARE_R2_ACCESS_KEY_ID=CLOUDFLARE_R2_ACCESS_KEY_ID:latest,
        CLOUDFLARE_R2_SECRET_ACCESS_KEY=CLOUDFLARE_R2_SECRET_ACCESS_KEY:latest,
        CLOUDFLARE_R2_BUCKET_NAME=CLOUDFLARE_R2_BUCKET_NAME:latest,
        RESEND_API_KEY=RESEND_API_KEY:latest,
        FROM_EMAIL=FROM_EMAIL:latest,
        VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest,
        VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest,
        VAPID_SUBJECT=VAPID_SUBJECT:latest,
        CRON_SECRET=CRON_SECRET:latest,
        GEMINI_API_KEY=GEMINI_API_KEY:latest

# Artifact Registry images produced by this build
images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # Faster builds (8 vCPU) — billed per build-minute
  dynamic_substitutions: true
