<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Camera body -->
  <rect x="96" y="186" width="320" height="214" rx="32" fill="url(#g)"/>
  <!-- Camera lens outer -->
  <circle cx="256" cy="290" r="70" fill="#0f172a"/>
  <!-- Camera lens inner -->
  <circle cx="256" cy="290" r="48" fill="url(#g)" opacity="0.9"/>
  <!-- Camera lens highlight -->
  <circle cx="256" cy="290" r="24" fill="white" opacity="0.25"/>
  <!-- Viewfinder bump -->
  <rect x="186" y="150" width="96" height="48" rx="16" fill="url(#g)"/>
  <!-- Flash dot -->
  <circle cx="374" cy="218" r="16" fill="white" opacity="0.5"/>
</svg>
